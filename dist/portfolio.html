<script>
// 기종·수리별 맞춤 sub/trust/time 문구 매핑 (index.html과 동일 로직)
function daolCaseDetail(c){
  var m = (c.model || '').toString();
  var t = (c.type || '수리').toString();
  var rt = (c.repair_type || '').toString().toLowerCase();
  var isIpad   = m.indexOf('아이패드') >= 0 || m.indexOf('iPad') >= 0;
  var isWatch  = m.indexOf('애플워치') >= 0 || m.indexOf('Apple Watch') >= 0 || m.indexOf('에르메스') >= 0;
  var isAirpods= m.indexOf('에어팟') >= 0 || m.indexOf('AirPods') >= 0;
  var isMac    = m.indexOf('맥북') >= 0 || m.indexOf('MacBook') >= 0;
  var isPencil = m.indexOf('펜슬') >= 0 || m.indexOf('Pencil') >= 0;
  var isIphone = !isIpad && !isWatch && !isAirpods && !isMac && !isPencil;

  var isScreen  = rt.indexOf('screen') >= 0 || t.indexOf('화면') >= 0 || t.indexOf('액정') >= 0;
  var isBack    = rt.indexOf('back') >= 0 || t.indexOf('후면') >= 0;
  var isBattery = rt.indexOf('battery') >= 0 || t.indexOf('배터리') >= 0;
  var isCharge  = rt.indexOf('charge') >= 0 || t.indexOf('충전') >= 0;
  var isCombo   = t.indexOf('+') >= 0;
  var isWater   = t.indexOf('침수') >= 0 || rt.indexOf('water') >= 0;
  var isCamera  = t.indexOf('카메라') >= 0 || rt.indexOf('camera') >= 0;
  var isSensor  = t.indexOf('센서') >= 0 || rt.indexOf('sensor') >= 0;
  var isSpeaker = t.indexOf('스피커') >= 0 || rt.indexOf('speaker') >= 0;

  var sub;
  if(isIpad && isScreen)        sub = '액정 깨짐 → 추출/재생 정품 디스플레이로 살려냈습니다';
  else if(isIpad && isCharge)   sub = '충전 단자 손상 → 단자 부품 정밀 교체';
  else if(isWatch && isBack)    sub = '후면 유리 깨짐 → 100% 추출 정품으로 복원';
  else if(isWatch && isScreen)  sub = '액정 손상 → 시리즈·소재 맞춤 부품으로 복원';
  else if(isWatch && isBattery) sub = '배터리 노화 → 발열·꺼짐 해결';
  else if(isWatch && isSensor)  sub = '센서 오작동 → 심박·산소 모듈 정밀 점검';
  else if(isWatch)              sub = t + ' — 워치 분해 정밀 복원';
  else if(isCombo)              sub = t + ' — 본체 보존 + 동시 교체로 부담 ↓';
  else if(isScreen)             sub = '액정 깨짐 → 정품/DD(OEM) 옵션 비교 후 복원';
  else if(isBack)               sub = '후면 유리 깨짐 → 정밀 분리 + 정품급 OEM 교체';
  else if(isBattery)            sub = '배터리 노화 → 셀 교체·정품 인증·일반 호환 중 선택';
  else if(isCharge)             sub = '충전 단자 이상 → 정밀 청소 또는 단자 부품 교체';
  else if(isCamera)             sub = '카메라 흐림·먹통 → 모듈 단독 교체';
  else if(isSpeaker)            sub = '스피커 먹먹·노이즈 → 단품 교체';
  else if(isWater)              sub = '침수 → 분해 세척 + 보드 점검까지 단계별 복구';
  else                          sub = t + ' — 마스터 정밀 수리';

  var trust;
  if(isIpad && isScreen)        trust = '✓ 추출/재생 정품 액정만 사용 · fog 액정 X · 90일 보증';
  else if(isIpad && isCharge)   trust = '✓ 단자 부품 정품 사용 · 매장 도착 시 단자 교체 위주 · 90일 보증';
  else if(isWatch && isBack)    trust = '✓ 100% 추출 정품 · 본드 6시간 경화 · 90일 보증';
  else if(isWatch && isScreen)  trust = '✓ 비정품 메시지 X · 시리즈·소재별 정확 매칭 · 90일 보증';
  else if(isWatch && isBattery) trust = '✓ 정품 우선 사용 · 비정품 메시지 X · 90일 보증';
  else if(isWatch && isSensor)  trust = '✓ 정밀 진단 + 모듈 교체 · 90일 보증';
  else if(isWatch)              trust = '✓ 비정품 메시지 X · 본드 경화 안전 시간 확보 · 90일 보증';
  else if(isCombo && isScreen && isBattery) trust = '✓ 정품/DD 액정 + 셀·정품 배터리 동시 · 90일 보증';
  else if(isScreen)             trust = '✓ 정품·DD(OEM) 옵션 직접 선택 · 당일 30~60분 완료 · 90일 보증';
  else if(isBack)               trust = '✓ 1년 내 재파손 50% 할인 · 방수 패킹 재부착 · 90일 보증';
  else if(isBattery)            trust = '✓ 셀·정품 인증·일반 호환 3옵션 가격 공개 · 90일 보증';
  else if(isCharge)             trust = '✓ 정밀 청소 또는 단자 부품 교체 · 90일 보증';
  else if(isCamera)             trust = '✓ 모듈 정품 우선 · 메인보드 분리 진단 · 90일 보증';
  else if(isSpeaker)            trust = '✓ 단품 정품 부품 · 90일 보증';
  else if(isWater)              trust = '✓ 분해 세척 + 단계별 견적 · 데이터 우선 보존';
  else                          trust = '✓ 마스터 직접 진단 · 견적 후 진행 · 90일 보증';

  var timeShort, timeLabel;
  if(isIpad){
    timeShort = '1~2일'; timeLabel = '부품 수급';
  } else if(isWatch && isBack){
    timeShort = '6시간';  timeLabel = '본드 경화 (다음 날)';
  } else if(isBack){
    timeShort = '3~4시간'; timeLabel = '당일 완료';
  } else if(isWater){
    timeShort = '1~3일';  timeLabel = '진단 후 안내';
  } else {
    var timeText = c.repair_time || (c.minutes ? c.minutes + '분' : '30분');
    timeShort = timeText.replace(/^당일[\s·]*/, '').replace(/~.*분/, '분').trim();
    timeLabel = '당일 완료';
  }
  return { sub: sub, trust: trust, timeShort: timeShort, timeLabel: timeLabel };
}

(function(){
  fetch('data/repair-stats.json?v=' + Math.floor(Date.now()/300000), {cache:'no-store'}).then(function(r){
    if(!r.ok) throw new Error('no data');
    return r.json();
  }).then(function(d){
    var cases = (d && d.portfolio_cases) || (d && d.slider_cases) || [];
    var grid = document.getElementById('pfGrid');
    var count = document.getElementById('pfCount');
    if(!cases.length){
      grid.innerHTML = '<div class="pf-empty">표시할 사례가 아직 없습니다.</div>';
      count.textContent = '';
      return;
    }
    var v = encodeURIComponent(d.updated_at || Date.now());
    // 초기 30건만 우선 노출. 나머지는 pf-card-hidden 으로 감춤 + "전체보기" 버튼으로 펼침
    var INITIAL_LIMIT = 30;
    var total = cases.length;
    var hasMore = total > INITIAL_LIMIT;
    count.innerHTML = '최근 <strong>' + Math.min(INITIAL_LIMIT, total) + '건</strong> 우선 표시'
      + (hasMore ? ' · 전체 <strong>' + total + '건</strong>' : '')
      + ' · 갱신 ' + (d.updated_at ? new Date(d.updated_at).toLocaleString('ko-KR') : '');
    grid.innerHTML = cases.map(function(c, idx){
      var hiddenCls = idx >= INITIAL_LIMIT ? ' pf-card-hidden' : '';
      var beforeUrl = c.before_img + '?v=' + v;
      var afterUrl  = c.after_img  + '?v=' + v;
      var detail = (typeof daolCaseDetail === 'function')
        ? daolCaseDetail(c)
        : { sub: (c.type || '수리') + ' — 깨끗하게 살려냈습니다',
            trust: '✓ 90일 무상 A/S · 마스터 직접 수리',
            timeShort: '30분', timeLabel: '당일 완료' };
      var journalBtn = c.journal_url
        ? '<a href="' + c.journal_url + '" class="pf-journal-link">📋 이 케이스 자세히 보기 →</a>'
        : '<a href="articles/journal.html" class="pf-journal-link">📋 다른 수리 사례 보기 →</a>';
      return [
        '<div class="pf-card' + hiddenCls + '">',
          '<div class="pf-slider" data-pf-slider>',
            '<div class="pf-img pf-after" style="background-image:url(\'' + afterUrl + '\')"></div>',
            '<div class="pf-img pf-before" style="background-image:url(\'' + beforeUrl + '\')"></div>',
            '<div class="pf-overlay"></div>',
            '<div class="pf-corner pf-corner-before">BEFORE</div>',
            '<div class="pf-corner pf-corner-after">AFTER</div>',
            '<div class="pf-handle"><div class="pf-handle-circle">',
              '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#E8732A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 17 18 12 13 7"/><polyline points="11 17 6 12 11 7"/></svg>',
            '</div></div>',
          '</div>',
          '<div class="pf-caption">',
            '<div class="pf-meta-top">📍 ' + (c.branch || '') + ' · ' + (c.date || '') + '</div>',
            '<div class="pf-main-title">' + (c.model || '') + '</div>',
            '<div class="pf-main-sub">' + detail.sub + '</div>',
            '<div class="pf-benefits">',
              '<div class="pf-benefit">',
                '<div class="pf-benefit-num">' + detail.timeShort + '</div>',
                '<div class="pf-benefit-label">' + detail.timeLabel + '</div>',
              '</div>',
              '<div class="pf-benefit pf-benefit-mid">',
                '<div class="pf-benefit-num">2,000<span>+</span></div>',
                '<div class="pf-benefit-label">네이버 후기 4.9★</div>',
              '</div>',
              '<div class="pf-benefit">',
                '<div class="pf-benefit-num">0<span>원</span></div>',
                '<div class="pf-benefit-label">수리 실패 시</div>',
              '</div>',
            '</div>',
            '<div class="pf-trust">' + detail.trust + '</div>',
            journalBtn,
          '</div>',
        '</div>'
      ].join('');
    }).join('');

    // "전체보기" 버튼 — 30건 넘으면 표시
    if (hasMore) {
      var wrap = document.getElementById('pfShowAllWrap');
      document.getElementById('pfShowAllCount').textContent = total;
      wrap.style.display = '';
      document.getElementById('pfShowAllBtn').addEventListener('click', function(){
        document.querySelectorAll('.pf-card-hidden').forEach(function(el){ el.classList.remove('pf-card-hidden'); });
        wrap.style.display = 'none';
        count.innerHTML = '총 <strong>' + total + '건</strong> 모두 표시 · 갱신 ' + (d.updated_at ? new Date(d.updated_at).toLocaleString('ko-KR') : '');
      });
    }

    // 각 슬라이더에 드래그 인터랙션 적용
    document.querySelectorAll('[data-pf-slider]').forEach(function(slider){
      var before = slider.querySelector('.pf-before');
      var handle = slider.querySelector('.pf-handle');
      var dragging = false, startX = 0, startY = 0, axis = null;
      function setPos(percent){
        percent = Math.max(0, Math.min(100, percent));
        var clip = 'inset(0 ' + (100 - percent) + '% 0 0)';
        before.style.clipPath = clip;
        before.style.webkitClipPath = clip;
        handle.style.left = percent + '%';
      }
      function getPercent(x){
        var rect = slider.getBoundingClientRect();
        return ((x - rect.left) / rect.width) * 100;
      }
      slider.addEventListener('mousedown', function(e){ dragging = true; setPos(getPercent(e.clientX)); e.preventDefault(); });
      document.addEventListener('mousemove', function(e){ if(dragging) setPos(getPercent(e.clientX)); });
      document.addEventListener('mouseup', function(){ dragging = false; });
      slider.addEventListener('touchstart', function(e){
        dragging = true; axis = null;
        startX = e.touches[0].clientX; startY = e.touches[0].clientY;
      }, {passive:true});
      slider.addEventListener('touchmove', function(e){
        if(!dragging) return;
        var dx = e.touches[0].clientX - startX, dy = e.touches[0].clientY - startY;
        if(axis === null && (Math.abs(dx) > 5 || Math.abs(dy) > 5)){
          axis = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
        }
        if(axis === 'h'){ e.preventDefault(); setPos(getPercent(e.touches[0].clientX)); }
        else if(axis === 'v'){ dragging = false; }
      }, {passive:false});
      slider.addEventListener('touchend', function(){ dragging = false; axis = null; });
      slider.addEventListener('touchcancel', function(){ dragging = false; axis = null; });
      setPos(50);
    });
  }).catch(function(e){
    document.getElementById('pfGrid').innerHTML = '<div class="pf-empty">데이터를 불러올 수 없습니다.</div>';
    document.getElementById('pfCount').textContent = '';
  });
})();
</script>
