<script>
(function(){
  fetch('data/repair-stats.json?v=' + Math.floor(Date.now()/300000), {cache:'no-store'}).then(function(r){
    if(!r.ok) throw new Error('no data');
    return r.json();
  }).then(function(d){
    var cases = (d && d.portfolio_cases) || (d && d.slider_cases) || [];
    var grid = document.getElementById('pfGrid');
    var count = document.getElementById('pfCount');
    if(!cases.length){
      grid.innerHTML = '<div class="pf-empty">표시할 사례가 아직 없습니다.</div>';
      count.textContent = '';
      return;
    }
    var v = encodeURIComponent(d.updated_at || Date.now());
    count.innerHTML = '총 <strong>' + cases.length + '건</strong> · 최근 갱신 ' + (d.updated_at ? new Date(d.updated_at).toLocaleString('ko-KR') : '');
    grid.innerHTML = cases.map(function(c){
      var beforeUrl = c.before_img + '?v=' + v;
      var afterUrl  = c.after_img  + '?v=' + v;
      return [
        '<div class="pf-card">',
          '<div class="pf-slider" data-pf-slider>',
            '<div class="pf-img pf-after" style="background-image:url(\'' + afterUrl + '\')"></div>',
            '<div class="pf-img pf-before" style="background-image:url(\'' + beforeUrl + '\')"></div>',
            '<div class="pf-overlay"></div>',
            '<div class="pf-corner pf-corner-before">BEFORE</div>',
            '<div class="pf-corner pf-corner-after">AFTER</div>',
            '<div class="pf-handle"><div class="pf-handle-circle">',
              '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#E8732A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 17 18 12 13 7"/><polyline points="11 17 6 12 11 7"/></svg>',
            '</div></div>',
          '</div>',
          '<div class="pf-caption">',
            '<div class="pf-caption-model">' + (c.branch || '') + ' · ' + (c.date || '') + '</div>',
            '<div class="pf-caption-title">' + (c.model || '') + ' — ' + (c.type || '수리') + '</div>',
            '<div class="pf-compare">',
              '<div class="pf-compare-item pf-compare-before">',
                '<div class="pf-compare-label">BEFORE</div>',
                '<div class="pf-compare-text">' + (c.before_text || '수리 전') + '</div>',
              '</div>',
              '<div class="pf-compare-item pf-compare-after">',
                '<div class="pf-compare-label">AFTER</div>',
                '<div class="pf-compare-text">' + (c.after_text || '수리 완료') + '</div>',
              '</div>',
            '</div>',
            '<div class="pf-caption-meta">',
              '<span class="pf-meta-tag pf-meta-time">⏱ ' + (c.repair_time || (c.minutes ? c.minutes + '분' : '30~60분')) + '</span>',
              '<span class="pf-meta-tag pf-meta-branch">📍 ' + (c.branch || '') + '</span>',
              '<span class="pf-meta-tag pf-meta-warranty">✓ 90일 보증</span>',
            '</div>',
          '</div>',
        '</div>'
      ].join('');
    }).join('');

    // 각 슬라이더에 드래그 인터랙션 적용
    document.querySelectorAll('[data-pf-slider]').forEach(function(slider){
      var before = slider.querySelector('.pf-before');
      var handle = slider.querySelector('.pf-handle');
      var dragging = false, startX = 0, startY = 0, axis = null;
      function setPos(percent){
        percent = Math.max(0, Math.min(100, percent));
        var clip = 'inset(0 ' + (100 - percent) + '% 0 0)';
        before.style.clipPath = clip;
        before.style.webkitClipPath = clip;
        handle.style.left = percent + '%';
      }
      function getPercent(x){
        var rect = slider.getBoundingClientRect();
        return ((x - rect.left) / rect.width) * 100;
      }
      slider.addEventListener('mousedown', function(e){ dragging = true; setPos(getPercent(e.clientX)); e.preventDefault(); });
      document.addEventListener('mousemove', function(e){ if(dragging) setPos(getPercent(e.clientX)); });
      document.addEventListener('mouseup', function(){ dragging = false; });
      slider.addEventListener('touchstart', function(e){
        dragging = true; axis = null;
        startX = e.touches[0].clientX; startY = e.touches[0].clientY;
      }, {passive:true});
      slider.addEventListener('touchmove', function(e){
        if(!dragging) return;
        var dx = e.touches[0].clientX - startX, dy = e.touches[0].clientY - startY;
        if(axis === null && (Math.abs(dx) > 5 || Math.abs(dy) > 5)){
          axis = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
        }
        if(axis === 'h'){ e.preventDefault(); setPos(getPercent(e.touches[0].clientX)); }
        else if(axis === 'v'){ dragging = false; }
      }, {passive:false});
      slider.addEventListener('touchend', function(){ dragging = false; axis = null; });
      slider.addEventListener('touchcancel', function(){ dragging = false; axis = null; });
      setPos(50);
    });
  }).catch(function(e){
    document.getElementById('pfGrid').innerHTML = '<div class="pf-empty">데이터를 불러올 수 없습니다.</div>';
    document.getElementById('pfCount').textContent = '';
  });
})();
</script>

</body>
</html>
