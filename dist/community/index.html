<script>
  const SUPABASE_URL = 'https://eybuyorlvbqxbvwyugcs.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_QqBHHM529mkONmJD_2kofA_1gCLrB0p';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  const PAGE_SIZE = 20;
  let currentPage = 0, currentCat = '전체', currentSearch = '', totalCount = 0;
  let isAdmin = false, searchTimer = null;

  const catClassMap = { '애플 소식':'cat-news','자유토론':'cat-free','사용 팁':'cat-tip','구매 추천':'cat-buy','기기 비교':'cat-compare','수리 Q&A':'cat-repair' };
  const typeClassMap = { '질문':'type-question','토론':'type-discussion','팁 공유':'type-tip','후기':'type-review' };

  function catClass(cat) { return catClassMap[cat] || 'cat-free'; }
  function typeClass(t) { return typeClassMap[t] || 'type-discussion'; }

  function timeAgo(d) {
    const s = (Date.now() - new Date(d)) / 1000;
    if (s < 60) return '방금 전';
    if (s < 3600) return Math.floor(s/60) + '분 전';
    if (s < 86400) return Math.floor(s/3600) + '시간 전';
    if (s < 2592000) return Math.floor(s/86400) + '일 전';
    return new Date(d).toLocaleDateString('ko-KR');
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function postHtml(p) {
    const cc = p.comments?.[0]?.count || 0;
    const lc = p.likes?.[0]?.count || 0;
    const unanswered = cc === 0 && p.category === '수리 Q&A';
    return `<div class="post-item" onclick="location.href='post.html?id=${p.id}'">
      <div class="post-item-top">
        <span class="cat-badge ${catClass(p.category)}">${esc(p.category)}</span>
        ${p.post_type ? `<span class="type-badge ${typeClass(p.post_type)}">${esc(p.post_type)}</span>` : ''}
        ${unanswered ? '<span class="badge-unanswered">미답변</span>' : ''}
        <span class="post-title">${esc(p.title)}</span>
        ${cc > 0 ? `<span class="post-comment-badge">[${cc}]</span>` : ''}
        ${isAdmin ? `<button class="delete-post-btn" onclick="event.stopPropagation();delPost('${p.id}')">삭제</button>` : ''}
      </div>
      <div class="post-meta">
        <span class="post-meta-author">${esc(p.author_nickname)}</span>
        <span>${timeAgo(p.created_at)}</span>
        <span>👁 ${p.view_count||0}</span>
        ${lc > 0 ? `<span>❤️ ${lc}</span>` : ''}
      </div>
    </div>`;
  }

  async function loadPopular() {
    const el = document.getElementById('popular-section');
    if (currentCat !== '전체' || currentSearch) { el.style.display = 'none'; return; }
    const { data } = await sb.from('posts').select('*, likes(count)').order('view_count', { ascending: false }).limit(3);
    if (!data || data.length === 0) { el.style.display = 'none'; return; }
    el.style.display = 'block';
    el.innerHTML = `<div class="section-label">🔥 인기글 TOP ${data.length}</div>
      <div class="popular-cards">${data.map((p,i) => `
        <a href="post.html?id=${p.id}" class="popular-card">
          <div class="popular-rank">${i+1}</div>
          <div class="popular-card-title">${esc(p.title)}</div>
          <div class="popular-card-meta"><span>👁 ${p.view_count||0}</span>${(p.likes?.[0]?.count||0)>0?`<span>❤️ ${p.likes[0].count}</span>`:''}</div>
        </a>`).join('')}
      </div>`;
  }

  async function loadOfficialPosts() {
    const listEl = document.getElementById('post-list');
    listEl.innerHTML = '<div class="loading">불러오는 중...</div>';
    const { data: oc } = await sb.from('comments').select('post_id').eq('author_nickname', '다올리페어').not('post_id', 'is', null);
    if (!oc || oc.length === 0) {
      listEl.innerHTML = '<div class="empty"><div class="empty-icon">💬</div><p>아직 공식 답변이 없습니다.</p></div>';
      document.getElementById('post-count').textContent = '전체 0개';
      document.getElementById('pagination').innerHTML = '';
      return;
    }
    const ids = [...new Set(oc.map(c => c.post_id).filter(id => id))];
    const { data } = await sb.from('posts').select('*, comments(count), likes(count)').in('id', ids).order('created_at', { ascending: false });
    document.getElementById('post-count').textContent = `전체 ${data?.length||0}개`;
    listEl.innerHTML = data && data.length > 0 ? data.map(p => postHtml(p)).join('') : '<div class="empty"><div class="empty-icon">💬</div><p>공식 답변 글이 없습니다.</p></div>';
    document.getElementById('pagination').innerHTML = '';
  }

  async function loadPosts() {
    if (currentCat === '공식답변') { await loadOfficialPosts(); return; }
    const listEl = document.getElementById('post-list');
    listEl.innerHTML = '<div class="loading">게시글을 불러오는 중...</div>';
    let q = sb.from('posts').select('*, comments(count), likes(count)', { count: 'exact' });
    if (currentCat !== '전체') q = q.eq('category', currentCat);
    if (currentSearch) q = q.or(`title.ilike.%${currentSearch}%,body.ilike.%${currentSearch}%`);
    q = q.order('created_at', { ascending: false }).range(currentPage * PAGE_SIZE, (currentPage+1)*PAGE_SIZE-1);
    const { data, error, count } = await q;
    if (error) { listEl.innerHTML = '<div class="loading">오류가 발생했습니다.</div>'; return; }
    totalCount = count || 0;
    document.getElementById('post-count').textContent = currentSearch ? `"${currentSearch}" 검색결과 ${totalCount}개` : `전체 ${totalCount}개`;
    if (!data || data.length === 0) {
      listEl.innerHTML = `<div class="empty"><div class="empty-icon">💬</div><p>${currentSearch ? '검색 결과가 없습니다.' : '아직 게시글이 없습니다.<br>첫 번째 글을 남겨보세요!'}</p></div>`;
      document.getElementById('pagination').innerHTML = '';
      return;
    }
    listEl.innerHTML = data.map(p => postHtml(p)).join('');
    renderPagination();
    loadPopular();
  }

  function renderPagination() {
    const total = Math.ceil(totalCount / PAGE_SIZE);
    if (total <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    document.getElementById('pagination').innerHTML = Array.from({length: total}, (_,i) =>
      `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i+1}</button>`).join('');
  }

  function goPage(n) { currentPage = n; loadPosts(); window.scrollTo(0,0); }

  function toggleOfficial() {
    const btn = document.getElementById('official-toggle');
    if (currentCat === '공식답변') {
      currentCat = '전체';
      btn.style.background = '#fff';
      btn.style.color = 'var(--muted)';
      btn.style.borderColor = 'var(--border)';
      document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('[data-cat="전체"]').classList.add('active');
    } else {
      currentCat = '공식답변';
      btn.style.background = 'rgba(232,115,42,0.1)';
      btn.style.color = 'var(--orange)';
      btn.style.borderColor = 'var(--orange)';
      document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    }
    currentPage = 0; currentSearch = '';
    document.getElementById('search-input').value = '';
    loadPosts();
  }

  document.getElementById('cat-tabs').addEventListener('click', e => {
    const tab = e.target.closest('.cat-tab');
    if (!tab) return;
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCat = tab.dataset.cat;
    currentPage = 0; currentSearch = '';
    document.getElementById('search-input').value = '';
    // 공식답변 토글 버튼 초기화
    const offBtn = document.getElementById('official-toggle');
    offBtn.style.background = '#fff';
    offBtn.style.color = 'var(--muted)';
    offBtn.style.borderColor = 'var(--border)';
    loadPosts();
  });

  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      currentSearch = e.target.value.trim();
      currentPage = 0; currentCat = '전체';
      document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('[data-cat="전체"]').classList.add('active');
      loadPosts();
    }, 400);
  });

  async function delPost(id) {
    if (!confirm('이 글을 삭제할까요?')) return;
    const { error } = await sb.from('posts').delete().eq('id', id);
    if (error) { alert('삭제 실패: ' + error.message); return; }
    loadPosts();
  }

  async function logout() { await sb.auth.signOut(); location.reload(); }

  async function init() {
    const { data: { user } } = await sb.auth.getUser();
    if (user) {
      const nick = user.user_metadata?.nickname || user.email?.split('@')[0] || '사용자';
      document.getElementById('nav-user').textContent = nick + '님';
      document.getElementById('nav-login-btn').style.display = 'none';
      document.getElementById('nav-logout-btn').style.display = 'inline-block';
      isAdmin = nick === '다올리페어';
    }
    loadPosts();
    loadPopular();
  }

  init();
</script>
</body>
</html>
