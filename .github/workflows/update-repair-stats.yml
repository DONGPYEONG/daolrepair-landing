name: 🔄 수리 통계 자동 갱신

# 실행 트리거: 매 2시간(영업시간대 KST 10시~22시) + 수동 실행 버튼
on:
  schedule:
    # cron 시간은 UTC 기준. KST = UTC+9.
    # 01:00 UTC = 10:00 KST, 13:00 UTC = 22:00 KST
    # 2시간 간격: 10·12·14·16·18·20·22시 (KST)
    - cron: '0 1,3,5,7,9,11,13 * * *'
  workflow_dispatch:    # GitHub UI에서 "Run workflow" 버튼으로 수동 실행 가능

permissions:
  contents: write       # 통계 JSON·사진을 자동 commit·push 권한

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 🛒 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth

      - name: 🔑 서비스 계정 키 복원
        env:
          SA_JSON: ${{ secrets.DAOLREPAIR_DRIVE_SA_JSON }}
        run: |
          mkdir -p .env
          printf '%s' "$SA_JSON" > .env/daolrepair-drive-sa.json
          # 키 유효성 간단 검증
          python -c "import json; json.load(open('.env/daolrepair-drive-sa.json'))" \
            && echo "✅ SA 키 정상" \
            || (echo "❌ SA 키 JSON 파싱 실패 — GitHub Secret 다시 확인하세요" && exit 1)

      - name: 📊 Drive 통계 갱신 (사진 다운로드 포함)
        run: python3 scripts/update_repair_stats.py

      - name: 📝 변경사항 자동 커밋
        run: |
          git config user.name  "daolrepair-bot"
          git config user.email "bot@daolrepair.local"
          git add data/repair-stats.json images/before-after/ || true
          if git diff --cached --quiet; then
            echo "ℹ️  변경사항 없음 — 커밋 건너뜀"
          else
            COUNT=$(git diff --cached --numstat | wc -l | tr -d ' ')
            git commit -m "🤖 수리 통계 자동 갱신 ($COUNT개 파일, $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST'))"
            git push origin HEAD:main
            echo "✅ 푸시 완료 — Cloudflare가 자동 배포합니다"
          fi
