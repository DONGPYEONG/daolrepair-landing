name: 🔄 수리 통계 자동 갱신

# 실행 트리거: 매 2시간 자동 + 코드 푸시 + 수동 실행
on:
  schedule:
    # 매 2시간 (KST 10·12·14·16·18·20·22시)
    - cron: '0 1,3,5,7,9,11,13 * * *'
  push:
    branches: [main]
    paths-ignore:
      # 봇이 자동으로 푸시하는 경로는 무시 (무한 루프 방지)
      - 'dist/**'
      - 'data/repair-stats.json'
      - 'images/before-after/**'
      # 문서·스크린샷 등은 빌드 트리거 안 함
      - '*.md'
      - 'scripts/SETUP.md'
      - '스크린샷*.png'
      - '캡쳐*.png'
  workflow_dispatch:    # GitHub UI에서 "Run workflow" 버튼으로 수동 실행

permissions:
  contents: write       # 통계 JSON·사진을 자동 commit·push 권한

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 🛒 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth anthropic Pillow easyocr

      - name: 💾 EasyOCR 모델 캐시
        uses: actions/cache@v4
        with:
          path: ~/.EasyOCR
          key: easyocr-models-ko-en-v1

      - name: 🔑 서비스 계정 키 복원
        env:
          SA_JSON: ${{ secrets.DAOLREPAIR_DRIVE_SA_JSON }}
        run: |
          mkdir -p .env
          printf '%s' "$SA_JSON" > .env/daolrepair-drive-sa.json
          # 키 유효성 간단 검증
          python -c "import json; json.load(open('.env/daolrepair-drive-sa.json'))" \
            && echo "✅ SA 키 정상" \
            || (echo "❌ SA 키 JSON 파싱 실패 — GitHub Secret 다시 확인하세요" && exit 1)

      - name: 📊 Drive 통계 갱신 (사진 다운로드 + AI Vision 분석)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/update_repair_stats.py

      - name: 📋 신규 케이스 → 수리 일지 자동 생성
        run: python3 scripts/gen_case_journals.py

      - name: 🔑 다올리페어 앱 Admin API 키 복원
        env:
          DAOLREPAIR_APP_API_KEY: ${{ secrets.DAOLREPAIR_APP_API_KEY }}
        run: |
          mkdir -p .env
          if [ -n "$DAOLREPAIR_APP_API_KEY" ]; then
            printf '%s' "$DAOLREPAIR_APP_API_KEY" > .env/daolrepair-app-api.txt
            echo "✅ Admin API 키 복원"
          else
            echo "⚠️ DAOLREPAIR_APP_API_KEY secret 미설정 — 수리 확인서 페치 스킵"
          fi

      - name: 📥 수리 확인서 API 자동 페치 (어제 + 오늘)
        run: |
          if [ -f .env/daolrepair-app-api.txt ]; then
            python3 scripts/fetch_certificates.py --no-photos || true
            # 오늘 데이터도 한 번 더 (오전·오후 신규 추가분)
            python3 scripts/fetch_certificates.py --date "$(TZ=Asia/Seoul date +'%Y-%m-%d')" --no-photos || true
          fi

      - name: 📝 일지 글 인증서 정보 자동 보강
        run: |
          if [ -f data/certificates/all-2026-04-15_to_2026-05-15.json ] || ls data/certificates/*.json >/dev/null 2>&1; then
            python3 scripts/enrich_journals_with_certs.py || true
          fi

      - name: 📦 Cloudflare 배포용 dist/ 빌드
        run: bash scripts/build-for-cloudflare.sh

      - name: 📝 변경사항 자동 커밋
        run: |
          git config user.name  "daolrepair-bot"
          git config user.email "bot@daolrepair.local"
          git add data/repair-stats.json data/journal-index.json data/certificates/ images/before-after/ articles/ sitemap.xml dist/ || true
          if git diff --cached --quiet; then
            echo "ℹ️  변경사항 없음 — 커밋 건너뜀"
          else
            COUNT=$(git diff --cached --numstat | wc -l | tr -d ' ')
            git commit -m "🤖 수리 통계 자동 갱신 ($COUNT개 파일, $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST'))"
            git push origin HEAD:main
            echo "✅ 푸시 완료 — Cloudflare가 자동 배포합니다"
          fi
